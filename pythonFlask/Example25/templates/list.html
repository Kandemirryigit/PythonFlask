<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Users</h1>

    {% for user in users %}
        <p>
            {{ user["name"] }} - {{ user["email"] }}
            <a href="/user/{{ user['id'] }}/edit">Edit</a>
            <a href="/user/{{ user['id'] }}/delete">Delete</a>
        
        </p>
    {% endfor %}

    <br>
    <a href="/">Add new user</a>
    
</body>
</html>
