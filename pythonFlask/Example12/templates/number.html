<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Example</title>
</head>
<body>
    <form method="POST" action="/check">
        <input type="number" name="number">
        <button type="submit">Check</button>
    </form>

    {% if result%}
        <h2>{{result}}</h2>
    {% endif %}

    
</body>
</html>
