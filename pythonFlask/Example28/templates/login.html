<!DOCTYPE html>
<html>
<body>
    <h1>Login</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input name="email" placeholder="email"><br><br>
        <input name="password" type="password" placeholder="password"><br><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
