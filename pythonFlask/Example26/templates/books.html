<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
</head>
<body>
    <h1>My Library</h1>
    <p>Welcome,{{session["user_email"]}}!</p>

    <a href="/book/add">Add new book</a><br>
    <a href="/exit">Exit</a>

    <hr>

    {% if books %}
        {% for book in books %}
            <p>
                <b>{{book["name"]}}</b> - {{book["author"]}} - {{book["point"]}}/5
                <a href="/book/{{ book['id'] }}/delete">Delete</a>
            </p>
        {% endfor %}
    {% else %}
            <p>No book added </p>
    {% endif %}

    
</body>
</html>
